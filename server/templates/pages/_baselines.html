<section class="page" id="page-baselines">
  <div class="page-header">
    <div>
      <div class="page-title">Base<span>lines</span></div>
      <div class="page-sub">Named task sequences that auto-run when a matching host is approved — and are callable from any task with <code class="inline">type: baseline</code>.</div>
    </div>
    <button class="btn btn-mint" id="bl-new-btn">New baseline</button>
  </div>

  <div class="bl-editor" id="bl-editor" data-editing="" hidden>
    <h3 id="bl-editor-title">New baseline</h3>
    <div class="bl-field">
      <label>Name</label>
      <input type="text" class="form-control" id="bl-name" placeholder="e.g. Linux bootstrap" maxlength="120">
      <div class="bl-hint">Tasks call it by this name: <code class="inline">- type: baseline / params: { name: "…" }</code></div>
    </div>
    <div class="bl-field">
      <label>Description <span style="color:var(--text-3);font-weight:400;">(optional)</span></label>
      <input type="text" class="form-control" id="bl-desc" placeholder="What this baseline does" maxlength="2000">
    </div>
    <div class="bl-field">
      <label>Steps — run top to bottom</label>
      <div class="bl-editor-steps" id="bl-editor-steps"></div>
      <select class="form-control" id="bl-def-picker" style="margin-top:4px;"></select>
    </div>
    <div class="bl-field">
      <label>Auto-run on hosts tagged <span style="color:var(--text-3);font-weight:400;">(comma-separated; blank = every approved host)</span></label>
      <input type="text" class="form-control" id="bl-tags" placeholder="os:linux, role:web">
    </div>
    <label class="setting-check"><input type="checkbox" id="bl-enabled" checked> Auto-dispatch when a matching host is approved</label>
    <div class="bl-editor-actions">
      <button class="btn btn-mint btn-sm" id="bl-save-btn">Save baseline</button>
      <button class="btn btn-outline btn-sm" id="bl-cancel-btn">Cancel</button>
    </div>
  </div>

  <div id="baselines-list" class="bl-list"></div>
</section>
