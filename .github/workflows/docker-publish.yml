name: Build & Publish

on:
  push:
    branches: [main]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [main]

env:
  SERVER_IMAGE: susquehannasyntax/vigil
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Django checks ───────────────────────────────────────────────────────────
  test:
    name: Django Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: vigil_test
          POSTGRES_USER: vigil
          POSTGRES_PASSWORD: vigil
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vigil"
          --health-interval=5s
          --health-retries=10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-retries=10

    env:
      DJANGO_SECRET_KEY: ci-test-secret-key
      DJANGO_DEBUG: "true"
      POSTGRES_DB: vigil_test
      POSTGRES_USER: vigil
      POSTGRES_PASSWORD: vigil
      POSTGRES_HOST: localhost
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/0

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Django system check
        run: python manage.py check
      - name: Run migrations
        run: python manage.py migrate --noinput
      - name: Run tests
        run: python manage.py test --verbosity=2

  # ── Build agent binaries (parallel) ─────────────────────────────────────────
  # Both macOS targets run on macos-latest (Apple Silicon). PyInstaller's
  # --target-arch flag cross-compiles darwin-amd64 without needing macos-13.
  build-agent:
    name: Agent — ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: darwin-amd64
            out: vigil-agent-darwin-amd64
            target_arch: x86_64
          - os: macos-latest
            platform: darwin-arm64
            out: vigil-agent-darwin-arm64
            target_arch: arm64
          - os: windows-latest
            platform: windows-amd64
            out: vigil-agent-windows-amd64
            target_arch: ""

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: agent

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller
      - name: Build binary (macOS)
        if: runner.os == 'macOS'
        run: pyinstaller --onefile --target-arch ${{ matrix.target_arch }} --name ${{ matrix.out }} vigil_agent/__main__.py
      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name ${{ matrix.out }} vigil_agent/__main__.py
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: agent/dist/${{ matrix.out }}*
          retention-days: 7

  # ── Build and push Docker image (main branch + tags only) ──────────────────
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: [test, build-agent]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Download all three agent binaries into server/agent_dist/.
      # COPY server/ . in the Dockerfile picks them up automatically.
      - name: Download agent binaries
        uses: actions/download-artifact@v4
        with:
          path: server/agent_dist/
          merge-multiple: true

      - name: Mark Unix binaries executable
        run: |
          chmod +x server/agent_dist/vigil-agent-darwin-amd64 || true
          chmod +x server/agent_dist/vigil-agent-darwin-arm64 || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.SERVER_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
